# =============================================================================
# MOVIVO — Definição canônica dos Docker Secrets do ambiente LOCAL
# =============================================================================
# Dono: Henrique (Platform/SRE) · US-0.6 / TASK-0.6.2
#
# ESTE ARQUIVO É UM FRAGMENTO DE MERGE, NÃO UM COMPOSE COMPLETO.
# Ele declara SOMENTE o bloco top-level `secrets:`. Os serviços (Postgres,
# PgBouncer, Redis, Sentinel) são entregues pela US-0.2 em `docker-compose.yml`
# e apenas *referenciam* estes secrets.
#
# COMO É CARREGADO (resolvido na US-0.2):
#   `docker-compose.yml` faz `include: [docker-compose.secrets.yml]`, então
#   qualquer `docker compose <comando>` já mescla os dois. Não é preciso repetir
#   `-f docker-compose.yml -f docker-compose.secrets.yml` (embora isso continue
#   funcionando — o merge é idempotente).
#
#   A alternativa avaliada e DESCARTADA foi declarar COMPOSE_FILE no `.env`: o
#   Docker Compose v5 não lê essa variável do arquivo `.env` (verificado na
#   US-0.2), e defini-la ali daria falsa sensação de configuração.
#
#   Mantido como arquivo separado — em vez de movido para dentro do
#   docker-compose.yml — para que o inventário de segredos tenha um dono, um
#   arquivo e um diff próprio em code review. Os nomes abaixo são contrato
#   estável: renomear um secret aqui quebra o Compose, o docs/SECURITY.md e o
#   ConfigModule ao mesmo tempo.
#
# ─── REGRAS INEGOCIÁVEIS ─────────────────────────────────────────────────────
# 1. NENHUM destes valores pode aparecer em `environment:` de qualquer serviço.
#    `environment:` vaza em `docker inspect`, em `docker compose config`, no
#    /proc do host e nos logs de crash. (Sato §9.3 · ARQUITETURA.md §8)
# 2. Os arquivos-fonte vivem em `secrets/`, que está no .gitignore. Eles são
#    gerados por `scripts/gen-local-secrets.sh` (ou `.ps1`) e NUNCA versionados.
# 3. Dentro do container o Docker monta cada secret em `/run/secrets/<nome>`,
#    somente leitura e fora da imagem. No Compose standalone isso é um bind mount
#    read-only do arquivo; no Swarm/Vault (Fase B) vira tmpfs e nunca toca o disco.
#    Em ambos os modos o valor não aparece em `docker inspect` — verificado na US-0.6.
# 4. O serviço consome via a variável `<VAR>_FILE` apontando para esse caminho —
#    ver docs/SECURITY.md §"Contrato de consumo de secrets (*_FILE)".
# 5. Estes secrets são de DESENVOLVIMENTO LOCAL. Produção não usa arquivos no
#    disco do dev: usa `docker secret` do Swarm/Vault (Fase B, Sato §9.3).
# =============================================================================

secrets:
  # --- PostgreSQL ------------------------------------------------------------
  # Superusuário `postgres`: usado apenas pelo entrypoint da imagem para o
  # bootstrap do cluster (POSTGRES_PASSWORD_FILE). A aplicação nunca o usa.
  postgres_superuser_password:
    file: ./secrets/postgres_superuser_password

  # Role de RUNTIME da aplicação. NUNCA com BYPASSRLS, nunca dona das tabelas.
  # Consumida pela API como DATABASE_PASSWORD_FILE.
  postgres_app_password:
    file: ./secrets/postgres_app_password

  # Role de MIGRAÇÃO (dona do schema, roda drizzle-kit). Nunca usada em runtime.
  postgres_migrator_password:
    file: ./secrets/postgres_migrator_password

  # --- PgBouncer -------------------------------------------------------------
  # auth_file do PgBouncer: linhas `"usuario" "senha"` para movivo_app e
  # movivo_migrator. Regenerado junto com as senhas acima — os três arquivos são
  # coerentes por construção (o script os escreve na mesma execução).
  pgbouncer_userlist:
    file: ./secrets/pgbouncer_userlist.txt

  # --- Redis -----------------------------------------------------------------
  # requirepass do master/replica + auth do Sentinel. O redis-server lê via
  # `--requirepass "$(cat /run/secrets/redis_password)"` no command, nunca por
  # `environment:`.
  redis_password:
    file: ./secrets/redis_password
# ─── RESERVADO PARA AS PRÓXIMAS SPRINTS ──────────────────────────────────────
# Descomentar apenas quando o serviço que os consome existir. O Compose falha
# no `up` se um secret declarado E referenciado não tiver arquivo-fonte.
# O gen-local-secrets já cria `pgcrypto_key` para não travar a Sprint 2.
#
#  pgcrypto_key:                     # criptografia do bloco de saúde (LGPD Art.11)
#    file: ./secrets/pgcrypto_key
#  jwt_private_key:                  # RS256 — Sprint 2 (Sato §9.1)
#    file: ./secrets/jwt_private_key
