packages:
  - 'apps/*'
  - 'packages/*'
overrides:
  # Correções de CVE HIGH pegas pelo `pnpm audit` no CI (job `sca`, US-0.7).
  # Os seletores são ESCOPADOS à faixa vulnerável de propósito: um override global
  # de `picomatch` forçaria também os consumidores da linha 2.x (chokidar, micromatch),
  # que têm outra API, e quebraria o build. Datado: 2026-07-23.
  #
  # picomatch <4.0.4 — ReDoS via extglob. Origem: @nestjs/cli (devDependency de apps/api).
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4'
  # sharp <0.35.0 — CVEs herdadas do libvips. Origem: next>sharp (US-0.5, apps/web).
  'sharp@<0.35.0': '>=0.35.0'
  # postcss <=8.5.11 — leitura arbitrária de arquivo via sourceMappingURL em comentário
  # CSS. Origem: toolchain do Next/Tailwind. Datado: 2026-07-23.
  'postcss@<=8.5.11': '>=8.5.12'
allowBuilds:
  # `core-js` entra como dependência transitiva de `posthog-js` (US-0.5). Seu script de
  # postinstall só imprime uma mensagem de financiamento — não produz artefato nenhum.
  # Negado por princípio de menor privilégio (Sato): nenhum script sem necessidade técnica.
  core-js: false
  # esbuild é dependência transitiva de `drizzle-kit` e `tsx` (US-0.4). Seu script de
  # instalação apenas resolve/valida o binário nativo da plataforma correta; sem ele,
  # `db:generate`/`db:migrate`/`db:seed` não rodam. Nenhum dos dois é dependência de
  # runtime da API — ficam confinados a devDependencies de `apps/api`.
  esbuild: true
  # `sharp` é o otimizador de imagem nativo do Next.js 15 (US-0.5) em produção
  # (`next start` / `next/image`). Sem o script de instalação, o binário nativo da
  # plataforma não é resolvido e a otimização de imagem cai para um caminho degradado.
  sharp: true
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.6'
  - '@turbo/darwin-arm64@2.10.6'
  - '@turbo/linux-64@2.10.6'
  - '@turbo/linux-arm64@2.10.6'
  - '@turbo/windows-64@2.10.6'
  - '@turbo/windows-arm64@2.10.6'
  - turbo@2.10.6
