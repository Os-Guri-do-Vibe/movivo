; =============================================================================
; MOVIVO — PgBouncer em TRANSACTION MODE
; =============================================================================
; Dono: Henrique (Platform/SRE) · US-0.2 / TASK-0.2.2
; Requisitos de origem:
;   · ARQUITETURA.md §2 e ADR-003 — PgBouncer transaction mode desde o MVP.
;   · Sprint 0, regra inegociável #3 — a app fala SEMPRE na 5433, nunca na 5432.
;   · SECURITY.md §2.4 — auth_file é um Docker Secret, nunca um arquivo do repo.
;
; ┌───────────────────────────────────────────────────────────────────────────┐
; │ CONTRATO PARA QUEM CONSOME (Leonardo, US-0.3)                             │
; │  · A API conecta em  pgbouncer:5433  (dentro do Compose) ou                │
; │    localhost:5433 (API rodando no host), sempre com a role `movivo_app`.  │
; │  · PREPARED STATEMENTS SÃO PROIBIDOS. Em transaction pooling a conexão de  │
; │    servidor muda a cada transação e um prepared statement nomeado some.    │
; │    No Drizzle/postgres-js: `prepare: false` (env DATABASE_PREPARE=false).  │
; │  · LISTEN/NOTIFY SÃO PROIBIDOS (ARQUITETURA.md §2). Use Redis Pub/Sub.     │
; │  · SET/RESET de sessão não persiste entre transações — use SET LOCAL,      │
; │    que é exatamente o que a RLS exige (`SET LOCAL app.current_user_id`,    │
; │    ARQUITETURA.md §12.13).                                                 │
; └───────────────────────────────────────────────────────────────────────────┘
; =============================================================================

[databases]
; Um único banco lógico. `dbname` explícito para que o nome exposto ao cliente e
; o nome real fiquem desacoplados (facilita apontar para uma read replica depois
; sem tocar na string de conexão da aplicação).
; Nenhuma senha aqui de propósito: com `auth_user`/senha embutida, a credencial
; ficaria em texto claro num arquivo versionado. A autenticação do lado servidor
; usa a mesma credencial que o cliente apresentou (auth_file).
movivo = host=postgres port=5432 dbname=movivo

[pgbouncer]
; --- Rede ------------------------------------------------------------------
; 0.0.0.0 é o *interior do container*. A exposição real é decidida no Compose:
; a porta é publicada apenas em 127.0.0.1 no host, nunca em 0.0.0.0.
listen_addr = 0.0.0.0
listen_port = 5433
unix_socket_dir =

; --- Autenticação ----------------------------------------------------------
; scram-sha-256: o PgBouncer lê a senha em claro do userlist (que é um Docker
; Secret montado somente-leitura) e deriva o SCRAM tanto para o cliente quanto
; para o servidor. Nunca `trust`, nunca `md5`.
auth_type = scram-sha-256
auth_file = /run/secrets/pgbouncer_userlist

; Console administrativo (banco virtual `pgbouncer`): SHOW POOLS, SHOW STATS...
; `movivo_app` fica só como stats_user — a role de runtime não administra o
; pooler (least privilege; RELOAD/PAUSE/KILL são operações de plataforma).
admin_users = movivo_migrator
stats_users = movivo_app, movivo_migrator

; --- Pooling ---------------------------------------------------------------
; Transaction mode: a conexão de servidor volta ao pool no COMMIT/ROLLBACK.
; É o que permite centenas de conexões de app sobre ~50 conexões reais no
; Postgres da VPS KVM 2 (ADR-003: sem pooling o teto é ~100 conexões).
pool_mode = transaction
default_pool_size = 50
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3
max_client_conn = 500
; Teto absoluto de conexões reais contra o Postgres. Mantido abaixo do
; max_connections do servidor (100) para sobrar espaço a psql/manutenção/migração
; direta na 5432 — se este número encostar em 100, uma migração fica sem conexão.
max_db_connections = 80
max_user_connections = 80

; Em transaction pooling o server_reset_query DEVE ser vazio: o PgBouncer já
; garante que nada de estado de sessão sobrevive à transação, e rodar
; DISCARD ALL a cada transação é puro overhead. (Documentação oficial.)
server_reset_query =
server_reset_query_always = 0

; --- Compatibilidade de parâmetros de startup ------------------------------
; Drivers Node (postgres-js/pg) enviam estes parâmetros no handshake. Sem
; ignorá-los, o PgBouncer recusa a conexão em transaction mode.
ignore_startup_parameters = extra_float_digits,options,search_path,application_name

; --- Timeouts --------------------------------------------------------------
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 5
query_wait_timeout = 30
client_idle_timeout = 0
client_login_timeout = 30
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 30

; --- Log / observabilidade -------------------------------------------------
; Sem log de conexão/desconexão em dev: o ruído é alto e as linhas carregam
; usuário + IP (dado pessoal em log — SECURITY.md/LGPD). Em produção isso é
; endereçado com log estruturado e retenção definida, não com log verboso.
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
verbose = 0
