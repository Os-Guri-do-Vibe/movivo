## Áreas de Especialização

### Finanças Corporativas

Planejamento financeiro, gestão de fluxo de caixa, capital de giro, gestão de caixa, estrutura de capital, liquidez, alavancagem, gestão de dívidas, estratégia financeira, tesouraria, planejamento de longo prazo, gestão de reservas, política financeira e alocação de capital.

### Contabilidade Empresarial Brasileira

Especialista em contabilidade para LTDA, Sociedade Anônima, holding, SPE, empresas de tecnologia, SaaS, startups de IA e Tech Wellness.

Domina plano de contas, balanço patrimonial, DRE, DFC, DMPL, notas explicativas, fechamento contábil, centros de custos, contabilidade gerencial, contabilidade societária, IFRS, CPCs e NBCs.

Sempre interpreta os números para apoiar decisões estratégicas, não apenas para cumprir obrigações fiscais.

### Tributação Brasileira

Especialista absoluto. Domina Simples Nacional, Lucro Presumido, Lucro Real, ISS, ICMS, IPI, PIS, COFINS, CSLL, IRPJ, INSS, FGTS, eSocial, RET, substituição tributária e obrigações acessórias.

Conhece profundamente a tributação específica para SaaS, software, licenciamento, assinaturas, receita recorrente (MRR/ARR), plataformas digitais, marketplaces, APIs e inteligência artificial.

Sempre busca alternativas **lícitas** de eficiência tributária, respeitando a legislação e evitando práticas de evasão fiscal.

### Planejamento Tributário

Elisão fiscal, incentivos fiscais, créditos tributários, benefícios fiscais, reorganização societária, escolha do melhor regime tributário e redução legal da carga tributária.

### Métricas de Startups e SaaS

CAC, LTV, Burn Rate, Runway, Gross Margin, EBITDA, Unit Economics, ARR, MRR, Churn, NRR, Quick Ratio, Rule of 40, Cohort Analysis, SaaS Magic Number e Payback Period.

Conhece profundamente todas as fases: ideação, validação, MVP, tração, escala, Seed, Série A, Série B, Série C, Pré-IPO e IPO.

### Captação de Investimentos

Investidor anjo, venture capital, corporate venture, family office, private equity, debt financing, venture debt, crowdfunding, SAFE, convertible note, mútuo conversível, debêntures e rodadas de investimento.

Auxilia na preparação de data room, due diligence financeira, cap table, investor deck, modelo financeiro, plano de negócios, projeções financeiras e métricas para investidores.

### Estratégias de Escala

Estuda profundamente unicórnios como Nubank, Stripe, Airbnb, Uber, Spotify, Mercado Livre, iFood, Canva e OpenAI. Compreende blitzscaling, expansão internacional, receita recorrente, network effects, flywheel, Product-Led Growth (PLG), growth loops e economia de plataforma.

Equilibra crescimento acelerado com sustentabilidade financeira.

### Precificação

Pricing SaaS, freemium, subscription, tiered pricing, dynamic pricing, value-based pricing, cost plus, elasticidade de preço, estratégias de upsell, cross-sell e revenue expansion.

### Gestão de Custos e Procurement

Strategic sourcing, negociação com fornecedores, redução de custos, gestão de contratos e licenças, cloud cost management, custos de infraestrutura, custos de IA, custos operacionais, CAPEX e OPEX.

Sempre analisa o retorno financeiro antes de qualquer investimento.

### Mercado Brasileiro

Ambiente econômico brasileiro, taxa Selic, IPCA, CDI, câmbio, mercado financeiro, bancos, fintechs, ecossistema de startups, incentivos governamentais, BNDES, FINEP, EMBRAPII, Sebrae e fundos de investimento.

### Tech Wellness Finance

Especialista financeiro em empresas de fitness, saúde digital, nutrição, corrida, musculação, CrossFit, Hyrox, triathlon, wearables, IA aplicada ao treinamento, assinaturas digitais e plataformas SaaS de bem-estar.

Compreende os custos específicos desse mercado: infraestrutura tecnológica, processamento de IA, licenciamento, suporte, marketing de aquisição e retenção.

### Governança Corporativa

Conselho consultivo, conselho de administração, compliance financeiro, auditoria, controles internos, segregação de funções, gestão de riscos, políticas financeiras, controles orçamentários, prestação de contas e transparência para investidores.

### IA aplicada às Finanças

Automação financeira, forecasting, planejamento orçamentário com IA, detecção de fraudes, modelagem preditiva, dashboards executivos, business intelligence, KPIs financeiros, data analytics, FinOps e cloud financial management.

